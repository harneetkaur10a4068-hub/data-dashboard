<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Real-Time Data Visualization Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f6f9;
}

header{
    background:#2c3e50;
    color:white;
    padding:15px;
    text-align:center;
}

.container{
    padding:20px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
    text-align:center;
}

.card h3{
    color:#555;
}

.card p{
    font-size:28px;
    margin-top:10px;
    font-weight:bold;
    color:#3498db;
}

.chart-container{
    background:white;
    margin-top:25px;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.table-container{
    background:white;
    margin-top:25px;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
    overflow-x:auto;
}

table{
    width:100%;
    border-collapse:collapse;
}

table th, table td{
    padding:12px;
    border:1px solid #ddd;
    text-align:center;
}

table th{
    background:#3498db;
    color:white;
}

button{
    margin-top:20px;
    background:#27ae60;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#219150;
}
</style>
</head>

<body>

<header>
    <h1>Real-Time Data Visualization Dashboard</h1>
</header>

<div class="container">

    <div class="cards">
        <div class="card">
            <h3>Total Users</h3>
            <p id="users">1200</p>
        </div>

        <div class="card">
            <h3>Revenue</h3>
            <p id="revenue">$5000</p>
        </div>

        <div class="card">
            <h3>Orders</h3>
            <p id="orders">350</p>
        </div>

        <div class="card">
            <h3>Visitors</h3>
            <p id="visitors">1800</p>
        </div>
    </div>

    <div class="chart-container">
        <h2>Live Traffic Graph</h2>
        <canvas id="myChart"></canvas>
    </div>

    <div class="table-container">
        <h2>Recent Reports</h2>

        <table id="reportTable">
            <thead>
                <tr>
                    <th>Time</th>
                    <th>Users</th>
                    <th>Revenue</th>
                    <th>Orders</th>
                </tr>
            </thead>

            <tbody>
            </tbody>
        </table>

        <button onclick="exportCSV()">
            Export Report CSV
        </button>
    </div>

</div>

<script>

// Statistics
let users = 1200;
let revenue = 5000;
let orders = 350;
let visitors = 1800;

// Chart
const ctx = document.getElementById('myChart');

const chart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: [],
        datasets: [{
            label: 'Live Visitors',
            data: [],
            borderColor: '#3498db',
            backgroundColor: 'rgba(52,152,219,0.2)',
            fill:true,
            tension:0.4
        }]
    },
    options: {
        responsive:true,
        scales:{
            y:{
                beginAtZero:true
            }
        }
    }
});

// Real-Time Update
setInterval(() => {

    users += Math.floor(Math.random()*10);
    revenue += Math.floor(Math.random()*100);
    orders += Math.floor(Math.random()*5);
    visitors += Math.floor(Math.random()*20);

    document.getElementById('users').innerText = users;
    document.getElementById('revenue').innerText = "$" + revenue;
    document.getElementById('orders').innerText = orders;
    document.getElementById('visitors').innerText = visitors;

    const time = new Date().toLocaleTimeString();

    chart.data.labels.push(time);
    chart.data.datasets[0].data.push(visitors);

    if(chart.data.labels.length > 10){
        chart.data.labels.shift();
        chart.data.datasets[0].data.shift();
    }

    chart.update();

    addReport(time, users, revenue, orders);

}, 3000);


// Reports Table
function addReport(time, users, revenue, orders){

    const table =
    document.querySelector("#reportTable tbody");

    const row = table.insertRow(0);

    row.insertCell(0).innerHTML = time;
    row.insertCell(1).innerHTML = users;
    row.insertCell(2).innerHTML = "$"+revenue;
    row.insertCell(3).innerHTML = orders;

    if(table.rows.length > 15){
        table.deleteRow(15);
    }
}


// Export CSV
function exportCSV(){

    let csv = [];

    let rows =
    document.querySelectorAll("table tr");

    rows.forEach(row => {

        let cols =
        row.querySelectorAll("td, th");

        let data = [];

        cols.forEach(col =>
        data.push(col.innerText));

        csv.push(data.join(","));
    });

    let csvFile =
    new Blob([csv.join("\n")],
    {type:"text/csv"});

    let downloadLink =
    document.createElement("a");

    downloadLink.download =
    "dashboard_report.csv";

    downloadLink.href =
    window.URL.createObjectURL(csvFile);

    downloadLink.click();
}

</script>

</body>
</html>
